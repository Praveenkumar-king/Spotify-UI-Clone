<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Spotify UI Clone - Your music library.">
  <title>Spotify - Library</title>
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Custom Stylesheets -->
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/player.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/responsive.css">
  <style>
    /* Unique style for Liked Songs big card */
    .liked-songs-big-card {
      background: linear-gradient(135deg, #450af5 0%, #8e8ee5 100%);
      border-radius: 8px;
      padding: 24px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      min-height: 220px;
      grid-column: span 2;
      box-shadow: 0 8px 24px rgba(0,0,0,0.3);
      transition: transform 0.2s;
      position: relative;
    }
    .liked-songs-big-card:hover {
      transform: translateY(-4px);
    }
    
    .liked-songs-big-card .card-play-btn {
      opacity: 0;
      bottom: 24px;
      right: 24px;
      position: absolute;
    }
    
    .liked-songs-big-card:hover .card-play-btn {
      opacity: 1;
      transform: translateY(0);
    }
    
    /* Layout for library list tags filtering */
    .library-filter-tags {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
    }
    
    .filter-tag {
      background-color: rgba(255,255,255,0.08);
      color: var(--spotify-white);
      padding: 8px 16px;
      border-radius: 30px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: background-color 0.2s;
    }
    
    .filter-tag.active {
      background-color: var(--spotify-white);
      color: var(--spotify-black);
    }
    
    .filter-tag:hover:not(.active) {
      background-color: rgba(255,255,255,0.15);
    }
  </style>
</head>
<body>

  <div class="app-container">
    
    <!-- ==========================================
         1. Left Sidebar Navigation Panel
         ========================================== -->
    <aside class="sidebar">
      
      <div class="sidebar-panel">
        <a href="index.html" class="sidebar-logo">
          <img src="assets/images/logo.png" alt="Spotify Logo">
          <span>Spotify</span>
        </a>
        <ul class="sidebar-nav-list">
          <li class="sidebar-nav-item">
            <a href="index.html">
              <i class="fa-solid fa-house"></i>
              <span>Home</span>
            </a>
          </li>
          <li class="sidebar-nav-item">
            <a href="search.html">
              <i class="fa-solid fa-magnifying-glass"></i>
              <span>Search</span>
            </a>
          </li>
        </ul>
      </div>

      <div class="sidebar-panel library-panel">
        <div class="library-header">
          <div class="library-title" onclick="window.location.href='library.html'">
            <i class="fa-solid fa-lines-lean"></i>
            <span>Your Library</span>
          </div>
          <button class="control-btn" style="width:24px; height:24px;" onclick="showToast('Create Playlist clicked')">
            <i class="fa-solid fa-plus" style="font-size:12px;"></i>
          </button>
        </div>
        <div class="library-scroll" id="library-playlists">
          <!-- Library items loaded dynamically -->
        </div>
      </div>

    </aside>

    <!-- ==========================================
         2. Main Application View Section
         ========================================== -->
    <main class="main-view fade-in-up">
      
      <!-- Top Sticky Navigation Bar -->
      <header class="top-bar">
        <div class="nav-controls">
          <button class="control-btn" id="nav-back"><i class="fa-solid fa-chevron-left"></i></button>
          <button class="control-btn disabled" id="nav-forward"><i class="fa-solid fa-chevron-right"></i></button>
        </div>

        <div style="display:flex; gap:16px; align-items:center;">
          <button class="badge badge-dark" onclick="window.location.href='premium.html'">Explore Premium</button>
          
          <!-- User Menu Dropdown -->
          <div class="user-menu" id="user-menu-trigger">
            <img src="assets/artists/taylor_swift.jpg" class="user-avatar" alt="Avatar">
            <span class="user-name">Praveen Kumar</span>
            <i class="fa-solid fa-caret-down" style="font-size:10px;"></i>
            
            <div class="me-dropdown" id="user-dropdown-menu" style="position: absolute; top: 36px; right: 0; width: 180px; background-color: var(--spotify-card); border-radius: 4px; display: none; flex-direction: column; z-index: 1000; padding: 4px; box-shadow: 0 8px 16px rgba(0,0,0,0.5);">
              <a href="#" style="padding: 10px 12px; font-size:13px; font-weight:600; border-radius:3px;" class="sidebar-nav-item" onclick="showToast('Profile clicked')">Profile</a>
              <a href="#" style="padding: 10px 12px; font-size:13px; font-weight:600; border-radius:3px;" class="sidebar-nav-item" onclick="showToast('Settings clicked')">Settings</a>
              <hr style="border:none; border-bottom:1px solid rgba(255,255,255,0.05); margin:4px 0;">
              <a href="index.html" style="padding: 10px 12px; font-size:13px; font-weight:600; border-radius:3px;" class="sidebar-nav-item">Log out</a>
            </div>
          </div>
        </div>
      </header>

      <!-- Scrollable Library Content area -->
      <div style="flex-grow:1; overflow-y:auto; padding:24px 32px 32px 32px;">
        
        <h1 style="font-size:32px; font-weight:800; margin-bottom:24px; letter-spacing:-1px;">Playlists</h1>
        
        <!-- Library tag filter navigation -->
        <div class="library-filter-tags">
          <button class="filter-tag active" onclick="filterLibrary('all')">All</button>
          <button class="filter-tag" onclick="filterLibrary('playlists')">Playlists</button>
          <button class="filter-tag" onclick="filterLibrary('artists')">Artists</button>
        </div>

        <!-- Custom Grids showing Liked Songs & Saved Playlists -->
        <div class="cards-grid" id="library-items-grid">
          
          <!-- Big Liked Songs Card -->
          <div class="liked-songs-big-card" onclick="window.location.href='playlist.html'">
            <div style="display:flex; flex-direction:column; gap:8px;">
              <h2 style="font-size:32px; font-weight:800; line-height:1.1;">Liked Songs</h2>
              <p style="font-size:16px; font-weight:500;" id="liked-songs-count-text">0 liked songs</p>
            </div>
            <button class="card-play-btn" onclick="event.stopPropagation(); playFirstLikedSong()">
              <i class="fa-solid fa-play"></i>
            </button>
          </div>
          
          <!-- Library Playlists Injected below -->

        </div>

      </div>

    </main>

  </div>

  <!-- Mobile Nav -->
  <nav class="mobile-nav-bar">
    <a href="index.html" class="mobile-nav-item">
      <i class="fa-solid fa-house"></i>
      <span>Home</span>
    </a>
    <a href="search.html" class="mobile-nav-item">
      <i class="fa-solid fa-magnifying-glass"></i>
      <span>Search</span>
    </a>
    <a href="library.html" class="mobile-nav-item active">
      <i class="fa-solid fa-lines-lean"></i>
      <span>Your Library</span>
    </a>
  </nav>

  <!-- Bottom Player -->
  <footer class="player-bar">
    <div class="player-left">
      <img src="assets/albums/after_hours.jpg" class="player-album-art" id="player-art" alt="">
      <div class="player-track-info">
        <span class="player-track-title" id="player-title" onclick="viewAlbum('After Hours')">Blinding Lights</span>
        <span class="player-track-artist" id="player-artist">The Weeknd</span>
      </div>
      <button class="player-like-btn" id="player-like"><i class="fa-regular fa-heart"></i></button>
    </div>

    <div class="player-center">
      <div class="playback-controls">
        <button class="btn-icon" id="player-shuffle"><i class="fa-solid fa-shuffle"></i></button>
        <button class="btn-icon" id="player-prev"><i class="fa-solid fa-backward-step"></i></button>
        <button class="btn-play-pause" id="player-play-pause"><i class="fa-solid fa-play"></i></button>
        <button class="btn-icon btn-next-mobile" id="player-next"><i class="fa-solid fa-forward-step"></i></button>
        <button class="btn-icon" id="player-repeat"><i class="fa-solid fa-repeat"></i></button>
      </div>
      <div class="progress-container">
        <span class="time-stamp" id="player-current-time">0:00</span>
        <div class="progress-bar-wrapper" id="player-seek-bar">
          <div class="progress-bar-fill" id="player-progress-fill">
            <div class="progress-handle"></div>
          </div>
        </div>
        <span class="time-stamp" id="player-duration-total">3:20</span>
      </div>
    </div>

    <div class="player-right">
      <button class="btn-icon" onclick="showToast('Open lyrics panel')"><i class="fa-solid fa-microphone-lines"></i></button>
      <button class="btn-icon" onclick="showToast('Show music queue')"><i class="fa-solid fa-list-ul"></i></button>
      <button class="btn-icon" onclick="showToast('Connect to a device')"><i class="fa-solid fa-computer-speaker"></i></button>
      <div class="volume-container">
        <button class="btn-icon" id="player-volume-icon"><i class="fa-solid fa-volume-high"></i></button>
        <div class="volume-bar-wrapper" id="player-volume-bar">
          <div class="volume-bar-fill" id="player-volume-fill">
            <div class="progress-handle"></div>
          </div>
        </div>
      </div>
      <button class="btn-icon" onclick="showToast('Toggle full screen player')"><i class="fa-solid fa-maximize"></i></button>
    </div>
  </footer>

  <!-- Scripts -->
  <script src="js/app.js"></script>
  <script src="js/player.js"></script>
  <script src="js/navigation.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      // Get user liked count
      const likedCount = SPOTIFY_DB.tracks.filter(t => localStorage.getItem(`liked_track_${t.id}`) === "true").length;
      const countEl = document.getElementById("liked-songs-count-text");
      if (countEl) {
        countEl.textContent = `${likedCount} liked songs`;
      }
      
      renderLibraryGrid('all');
    });

    window.filterLibrary = function(type) {
      // Toggle active tag styles
      const tags = document.querySelectorAll(".filter-tag");
      tags.forEach(tag => {
        tag.classList.remove("active");
        if (tag.getAttribute("onclick").includes(type)) {
          tag.classList.add("active");
        }
      });
      
      renderLibraryGrid(type);
    }

    function renderLibraryGrid(type) {
      const grid = document.getElementById("library-items-grid");
      if (!grid) return;
      
      // Clear existing playlists, keep Liked Songs big card if all/playlists
      let html = "";
      
      if (type === 'all' || type === 'playlists') {
        const likedCount = SPOTIFY_DB.tracks.filter(t => localStorage.getItem(`liked_track_${t.id}`) === "true").length;
        html += `
          <div class="liked-songs-big-card" onclick="window.location.href='playlist.html'">
            <div style="display:flex; flex-direction:column; gap:8px;">
              <h2 style="font-size:32px; font-weight:800; line-height:1.1;">Liked Songs</h2>
              <p style="font-size:16px; font-weight:500;">${likedCount} liked songs</p>
            </div>
            <button class="card-play-btn" onclick="event.stopPropagation(); playFirstLikedSong()">
              <i class="fa-solid fa-play"></i>
            </button>
          </div>
        `;
        
        // Add all playlists
        html += SPOTIFY_DB.playlists.map(pl => `
          <div class="music-card" onclick="viewPlaylist(${pl.id})">
            <div class="card-img-wrapper">
              <img src="${pl.art}" class="card-img" alt="">
              <button class="card-play-btn" onclick="event.stopPropagation(); playTrack(${pl.tracks[0]})">
                <i class="fa-solid fa-play"></i>
              </button>
            </div>
            <span class="card-title">${pl.name}</span>
            <p class="card-desc">Playlist &bull; Spotify</p>
          </div>
        `).join('');
      }
      
      if (type === 'all' || type === 'artists') {
        // Add artists
        html += SPOTIFY_DB.artists.map(art => `
          <div class="music-card artist-card" onclick="viewArtist(${art.id})">
            <div class="card-img-wrapper">
              <img src="${art.avatar}" class="card-img" alt="">
              <button class="card-play-btn" onclick="event.stopPropagation(); playTrack(${art.popularTracks[0]})">
                <i class="fa-solid fa-play"></i>
              </button>
            </div>
            <span class="card-title">${art.name}</span>
            <p class="card-desc">Artist</p>
          </div>
        `).join('');
      }
      
      grid.innerHTML = html;
    }

    window.playFirstLikedSong = function() {
      const likedTracks = SPOTIFY_DB.tracks.filter(t => localStorage.getItem(`liked_track_${t.id}`) === "true");
      if (likedTracks.length > 0) {
        playTrack(likedTracks[0].id);
      } else {
        showToast("No liked songs to play. Add some first!");
      }
    }
  </script>
</body>
</html>
